<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DialIn — Dial In Your Colors | Cyberpunk Color Memory Game</title>
  <meta name="description" content="A cyberpunk color memory game where you dial in colors from memory. Solo, daily challenges, multiplayer. Track your color bias and climb the ranks.">
  <meta name="keywords" content="color memory game, dial in colors, color recall, color guessing game, hsb color picker, color challenge, cyberpunk">
  <meta property="og:title" content="DialIn — Dial In Your Colors">
  <meta property="og:description" content="A cyberpunk color memory game. How close can you dial in?">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/cyber.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="scanlines">
  <!-- Language Toggle (fixed top-right) -->
  <button class="lang-switch" id="lang-toggle" title="Switch Language">中文</button>
  <!-- Matrix Rain Background Canvas -->
  <canvas id="matrix-bg"></canvas>

  <!-- Main App Container -->
  <div id="app">
    <!-- Navigation -->
    <nav class="nav-bar">
      <div class="nav-brand">
        <span class="nav-logo">◉</span>
        <span class="nav-title">DIALIN</span>
      </div>
      <div class="nav-stats" id="nav-stats">
        <span class="rank-badge" id="rank-badge">🥉 Bronze IV</span>
        <span class="rating-display" id="rating-display">0</span>
        <button class="lang-switch nav-lang-switch" id="nav-lang-toggle" title="Switch Language">中文</button>
      </div>
    </nav>

    <!-- Pages -->
    <main id="page-container">
      <!-- Home Page -->
      <section id="page-home" class="page active">
        <div class="hero">
          <div class="hero-logo">
            <div class="dial-knob">
              <div class="dial-indicator"></div>
            </div>
          </div>
          <h1 class="hero-title glitch" data-text="DIALIN">DIALIN</h1>
          <p class="hero-subtitle">Dial In Your Colors</p>
        </div>

        <div class="mode-grid">
          <button class="neon-btn neon-btn-cyan" onclick="DialIn.navigate('/free')">
            <span class="btn-icon">▶</span>
            <span class="btn-text">FREE DIAL</span>
            <span class="btn-sub">Solo Practice</span>
          </button>
          <button class="neon-btn neon-btn-purple" onclick="DialIn.navigate('/daily')">
            <span class="btn-icon">☀</span>
            <span class="btn-text">DAILY DIAL</span>
            <span class="btn-sub">Today's Challenge</span>
          </button>
          <button class="neon-btn neon-btn-pink" onclick="DialIn.navigate('/duel')">
            <span class="btn-icon">⚔</span>
            <span class="btn-text">DUEL</span>
            <span class="btn-sub">Multiplayer</span>
          </button>
        </div>

        <div class="home-stats cyber-panel">
          <div class="stat-row">
            <span class="stat-label" data-i18n="labelRank">DIALRANK</span>
            <span class="stat-value" id="home-rank">🥉 Bronze IV</span>
          </div>
          <div class="stat-row">
            <span class="stat-label" data-i18n="labelRating">RATING</span>
            <span class="stat-value mono" id="home-rating">0 / 400</span>
          </div>
          <div class="rating-bar">
            <div class="rating-bar-fill" id="home-rating-bar" style="width: 0%"></div>
          </div>
          <div class="stat-row">
            <span class="stat-label" data-i18n="labelStreak">STREAK</span>
            <span class="stat-value" id="home-streak">—</span>
          </div>
        </div>
      </section>

      <!-- Game Page (Free/Daily/Duel all use this) -->
      <section id="page-game" class="page">
        <div class="game-header">
          <span class="game-mode" id="game-mode-label">FREE DIAL</span>
          <span class="game-round" id="game-round">Round 1/5</span>
          <span class="game-timer" id="game-timer">
            <span class="timer-value" id="timer-value">10.0</span>
          </span>
          <button class="icon-btn" onclick="DialIn.navigate('/')" title="Exit">✕</button>
        </div>

        <!-- Color Display Phase -->
        <div class="game-phase" id="phase-display">
          <div class="color-slots" id="color-slots">
            <!-- Colors will be rendered here -->
          </div>
          <div class="display-progress">
            <div class="progress-bar">
              <div class="progress-fill" id="display-progress-fill"></div>
            </div>
          </div>
        </div>

        <!-- Pick Phase (hidden initially) -->
        <div class="game-phase hidden" id="phase-pick">
          <div class="pick-layout">
            <!-- Color Preview -->
            <div class="color-preview-container">
              <div class="color-preview" id="color-preview"></div>
              <span class="preview-label">YOUR SELECTION</span>
            </div>

            <!-- HSB Sliders -->
            <div class="slider-group">
              <div class="slider-row">
                <label class="slider-label">H</label>
                <input type="range" id="slider-h" class="neon-slider hue-track" min="0" max="360" value="180">
                <span class="slider-value mono" id="value-h">180°</span>
              </div>
              <div class="slider-row">
                <label class="slider-label">S</label>
                <input type="range" id="slider-s" class="neon-slider sat-track" min="0" max="100" value="80">
                <span class="slider-value mono" id="value-s">80%</span>
              </div>
              <div class="slider-row">
                <label class="slider-label">B</label>
                <input type="range" id="slider-b" class="neon-slider bri-track" min="0" max="100" value="90">
                <span class="slider-value mono" id="value-b">90%</span>
              </div>
            </div>

            <!-- Submit -->
            <button class="neon-btn neon-btn-cyan dial-in-btn" id="btn-dial-in">
              ◉ DIAL IN
            </button>
          </div>
        </div>

        <!-- Results Phase (hidden initially) -->
        <div class="game-phase hidden" id="phase-results">
          <div class="results-container" id="results-container">
            <!-- Results rendered here -->
          </div>
          <div class="results-actions">
            <button class="neon-btn neon-btn-cyan" data-i18n="btnShare" onclick="DialIn.shareResult()">
              📤 SHARE
            </button>
            <button class="neon-btn neon-btn-purple" data-i18n="btnAgain" onclick="DialIn.playAgain()">
              🔄 AGAIN
            </button>
            <button class="neon-btn" data-i18n="btnHome" onclick="DialIn.navigate('/')">
              🏠 HOME
            </button>
          </div>
        </div>
      </section>

      <!-- Daily Page -->
      <section id="page-daily" class="page">
        <div class="daily-header">
          <h2>☀ DAILY DIAL</h2>
          <span class="daily-date mono" id="daily-date"></span>
          <span class="daily-theme" id="daily-theme"></span>
        </div>
        <div class="daily-leaderboard cyber-panel" id="daily-leaderboard">
          <!-- Leaderboard rendered here -->
        </div>
        <button class="neon-btn neon-btn-purple daily-play-btn" id="btn-daily-play">
          ▶ PLAY TODAY'S CHALLENGE
        </button>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-brand">DIALIN.GG</span>
      <span class="footer-version">v1.0</span>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="js/scoring.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/colorPicker.js"></script>
  <script src="js/bias.js"></script>
  <script src="js/rank.js"></script>
  <script src="js/share.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
